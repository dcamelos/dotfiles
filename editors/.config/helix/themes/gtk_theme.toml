# --- INTERFAZ DE USUARIO ---
"ui.background" = { }
"ui.text" = { fg = "#c3c1c1"}
"ui.window" = { fg = "#6a5757" }
"ui.help" = { bg = "#6a5757", fg = "#c3c1c1"}

"ui.statusline" = { fg = "#c3c1c1", bg = "#6a5757" }
"ui.statusline.inactive" = { fg = "#707880", bg = "#120808"}
"ui.statusline.normal" = { fg = "#120808", bg = "#A65230", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#120808", bg = "#E21F0D", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#120808", bg = "#8E4C32", modifiers = ["bold"] }

"ui.virtual.indent-guide" = { fg = "#6a5757" }
"ui.virtual.inlay-hint" = { fg = "#707880" }

# --- SOLUCIÓN AL CONTRASTE ---
"ui.selection" = { fg = "#120808", bg = "#A65230" }
"ui.selection.primary" = { fg = "#120808", bg = "#93684A" } # Un color distinto para la selección principal
"ui.cursor" = { fg = "#120808", bg = "#c3c1c1"}
"ui.cursor.match" = { fg = "#A65230", modifiers = ["underline"] }

"ui.menu" = { fg = "#c3c1c1", bg = "#6a5757" }
"ui.menu.selected" = { fg = "#120808", bg = "#A65230" }
"ui.popup" = { bg = "#6a5757" }
"ui.linenr" = { fg = "#707880" }
"ui.linenr.selected" = { fg = "#A65230", modifiers = ["bold"] }

# --- SINTAXIS (Mapeo de lógica de colores) ---
"keyword" = "#A65230"
"variable" = "#c3c1c1"
"variable.parameter" = "#c3c1c1"
"function" = "#A65230"
"string" = "#E21F0D"
"constant" = "#8E4C32"
"type" = "#8E4C32"
"comment" = { fg = "#707880", modifiers = ["italic"] }
"operator" = "#A65230"
"punctuation" = "#707880"

# Diagnósticos
"error" = "#CF140A"
"warning" = "#8E4C32"
"info" = "#A65230"
"hint" = "#E21F0D"

[palette]
# Colores base para uso rápido
theme_bg = "#120808"
theme_fg = "#c3c1c1"
accent = "#A65230"
