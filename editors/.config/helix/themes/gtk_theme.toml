# --- INTERFAZ DE USUARIO ---
"ui.background" = { }
"ui.text" = { fg = "#c7c3c2"}
"ui.window" = { fg = "#725f5d" }
"ui.help" = { bg = "#725f5d", fg = "#c7c3c2"}

"ui.statusline" = { fg = "#c7c3c2", bg = "#725f5d" }
"ui.statusline.inactive" = { fg = "#707880", bg = "#20100e"}
"ui.statusline.normal" = { fg = "#20100e", bg = "#57657f", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#20100e", bg = "#878760", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#20100e", bg = "#648490", modifiers = ["bold"] }

"ui.virtual.indent-guide" = { fg = "#725f5d" }
"ui.virtual.inlay-hint" = { fg = "#707880" }

# --- SOLUCIÓN AL CONTRASTE ---
"ui.selection" = { fg = "#20100e", bg = "#57657f" }
"ui.selection.primary" = { fg = "#20100e", bg = "#876a81" } # Un color distinto para la selección principal
"ui.cursor" = { fg = "#20100e", bg = "#c7c3c2"}
"ui.cursor.match" = { fg = "#57657f", modifiers = ["underline"] }

"ui.menu" = { fg = "#c7c3c2", bg = "#725f5d" }
"ui.menu.selected" = { fg = "#20100e", bg = "#57657f" }
"ui.popup" = { bg = "#725f5d" }
"ui.linenr" = { fg = "#707880" }
"ui.linenr.selected" = { fg = "#57657f", modifiers = ["bold"] }

# --- SINTAXIS (Mapeo de lógica de colores) ---
"keyword" = "#57657f"
"variable" = "#c7c3c2"
"variable.parameter" = "#c7c3c2"
"function" = "#57657f"
"string" = "#878760"
"constant" = "#648490"
"type" = "#648490"
"comment" = { fg = "#707880", modifiers = ["italic"] }
"operator" = "#57657f"
"punctuation" = "#707880"

# Diagnósticos
"error" = "#92544f"
"warning" = "#648490"
"info" = "#57657f"
"hint" = "#878760"

[palette]
# Colores base para uso rápido
theme_bg = "#20100e"
theme_fg = "#c7c3c2"
accent = "#57657f"
