[dmenu]
dmenu_command = rofi -dmenu -i dmenu_command = rofi -dmenu -i -theme ~/.config/rofi/NetManagerDM.rasi
active_chars = ==
highlight = True
highlight_fg = #5E35B1
highlight_bg = #E0E0E0
highlight_bold = True
compact = True
pinentry =
wifi_icons = 󰤯󰤟󰤢󰤥󰤨
format = {name}  {icon}
list_saved = False
prompt = Networks

[dmenu_passphrase]
obscure = False
obscure_color = #222222

[pinentry]
description = Get network password
prompt = Password:

[editor]
terminal = kitty
gui_if_available = True
gui = nm-connection-editor
