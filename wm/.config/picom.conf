# --- Backend de Rendimiento (Optimizado para AMD Radeon) ---
backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# --- Sombras ---
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.5;
shadow-exclude = [
    "name = 'Notification'",
     "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

# --- Difuminado y Transparencia ---
# Si notas lento el sistema, cambia dual-kawase por kernel
blur-method = "dual_kawase";
blur-strength = 5;
blur-background-fixed = true;

blur-background-exclude = [
    "class_g = 'slop'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 1.0;

# --- Esquinas Redondeadas (Para que haga juego con tu Polybar) ---
corner-radius = 15;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# --- Desvanecimiento (Fading) ---
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;
