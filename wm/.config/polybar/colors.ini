; 90%	E6
; 80%	CC
; 75%	BF
; 50%	80
; 45%	73	Equilibrio entre color y transparencia.
; 40%	66	El color del fondo de pantalla domina mucho.
; 30%	4D	Muy transparente, apenas un tinte de color.
; 20%	33	Casi invisible, solo para separar elementos.
; 10%	1A	Apenas un "fantasma" del color de fondo.
; 0% (Invisible)	00
