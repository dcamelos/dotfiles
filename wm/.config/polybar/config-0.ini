;    в–Ҳв–Ҳв•‘в•ҡв•җв•җв–Ҳв–Ҳв•”в•җв•җв•қ   в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ      в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ  в–Ҳв–Ҳв•”в•җв•җв•җ в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ    в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ
;    в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘      в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—
;    в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘      в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘      в–Ҳв–Ҳв•”в•җв•җв•қ    в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•‘    в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘    в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘
;    в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘      в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘       в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ в•”в•қ  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘
;
;    This is a configuration, created from the default Polybar config.
;    Several New Modules are added to the default one.
;
;======================================================================

include-file = ~/.config/polybar/colors.ini


[bar/mybar]
monitor = ${env:MONITOR:}
width = 97%
offset-x = 1.5%
offset-y = 3%
height = 20pt
radius = 5
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 2.5pt
border-color = ${colors.border-color}
padding-left = 0
padding-right = 0
module-margin = 1
separator = "|"
separator-foreground = ${colors.disabled}
font-0 = "JetBrains Mono:size=10;3"
font-1 = "monospace:size=10;2"
font-2 = "CaskaydiaCove Nerd Font:size=11;4"
font-3 = "CaskaydiaCove Nerd Font Mono:size=15;5"
modules-left = mymenu ewmh xwindow network-menu
modules-center = date pacupdate
modules-right = battery pulseaudio memory cpu cpu-temp gpu-temp magic-click sessionLogout
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
override-redirect = false
wm-restack = generic
#wm-name = xfce4-panel
#bottom = false;--- CONFIGURACIГ“N COMГҡN (Para no repetir cГіdigo) ---
[bar/base]
monitor = ${env:MONITOR:}
height = 20pt
radius = 10
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 2.5pt
border-color = ${colors.border-color}
padding-left = 0
padding-right = 1
module-margin = 1
separator = "|"
separator-foreground = ${colors.disabled}
font-0 = "JetBrains Mono:size=11;3"
font-1 = "monospace:size=11;2"
font-2 = "CaskaydiaCove Nerd Font:size=12;4"
font-3 = "CaskaydiaCove Nerd Font Mono:size=16;5"
enable-ipc = true
override-redirect = false
offset-y = 1.5%

;--- BARRA IZQUIERDA ---
[bar/left]
inherit = bar/base
width = 30%
offset-x = 1%
modules-left = mymenu ewmh xwindow network-menu

;--- BARRA CENTRAL ---
[bar/center]
inherit = bar/base
width = 14%
offset-x = 42%
modules-center = date pacupdate

;--- BARRA DERECHA ---
[bar/right]
inherit = bar/base
width = 33%
offset-x = 67%
modules-right = battery pulseaudio memory cpu cpu-temp magic-click sessionLogout

[module/tray]
type = internal/tray
format = <tray>
format-margin = 5pt
tray-spacing = 8px
tray-padding = 0px
tray-size = 65%

[module/ewmh]
type = internal/xworkspaces

# Definimos los iconos globales para cada estado
# %icon% tomarГЎ estos valores segГәn el estado del workspace
icon-default = у°‘Ҡ

format = <label-state>
format-font = 3

# --- ConfiguraciГіn de etiquetas ---

# Espacio de trabajo ACTUAL (Activo)
label-active = у°®Ҝ
label-active-font = 4
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.primary} 
label-active-padding = 2

# Espacios de trabajo con ventanas (Ocupados)
label-occupied = у°Ҡ 
label-occupied-font = 3
label-occupied-foreground = ${colors.aurora-green}
label-occupied-padding = 1

# Espacios de trabajo VACГҚOS
label-empty = у°‘Ҡ
label-empty-font = 3
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

# Espacios con alertas (Urgentes)
label-urgent = у°Ҡ 
label-urgent-font = 3
label-urgent-background = ${colors.primary}
label-urgent-padding = 1

# --- Ajustes de comportamiento ---
enable-click = true
enable-scroll = true
pin-workspaces = false


[module/xwindow]
type = internal/xwindow
label = %class:0:60:...%
label-maxlen = 12
padding = 5

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix-foreground = ${colors.primary}
format-volume = <ramp-volume> <label-volume> 
label-volume = %{A3:~/.config/polybar/volume.sh:} %percentage%%%{A}
use-ui-max = false
label-muted = %{A3:~/.config/polybar/volume.sh:} Mute%{A}
label-muted-foreground = ${colors.disabled}
format-muted = <label-muted>
format-muted-prefix = у°қҹ
format-muted-prefix-font = 2
format-muted-padding = 1

; Ramp settings using <ramp-volume> used for Pulseaudio
ramp-volume-0 = у°қҹ
ramp-volume-1 = пҖҰ
ramp-volume-2 = пҖҰ
ramp-volume-3 = пҖҰ
ramp-volume-4 = пҖ§ 
ramp-volume-5 = пҖ§
ramp-volume-6 = пҖ§
ramp-volume-7 = пҖЁ 
ramp-volume-8 = пҖЁ 
ramp-volume-9 = пҖЁ 
ramp-volume-foreground = ${colors.aurora-green}
ramp-volume-font = 2

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%
label-layout-foreground = ${colors.primary}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "оҝ…  "
;format-prefix-font = 4
format-padding = 0.5
format-prefix-foreground = ${colors.aurora-orange}
label = "%percentage_used%%"

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "п’ј  "
;format-prefix-font = 4
format-padding = 0.5
format-prefix-foreground = ${colors.primary}
label = "%percentage%%"

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%



[module/network-menu]
type = custom/script
exec = ~/.config/polybar/network_speed.sh
interval = 3.0

format = <label>
# Esto muestra el nombre de la red al dejar el mouse quieto sobre el mГіdulo
format-connected-title = %{A1:networkmanager_dmenu:}%ssid%%{A}
format-background = ${colors.background}
format-foreground = ${colors.aurora-green}
format-padding = 2
# format-margin = 1

# Cambia esto: Usa la fuente 4 (que es font-3) para todo el output del script
label = %output%
label-font = 3

# AcciГіn para abrir el menГә de redes
click-left = networkmanager_dmenu
click-middle = nmcli radio wifi on && notify-send "Wi-Fi Activado" "Conectando a: $(nmcli -t -f NAME connection show --active | head -n 1)"
click-right = nmcli radio wifi off


[module/eth]
inherit = network-base
interface-type = wired
label-connected = "%{F#53E8D4}п„ғ %{F-}%downspeed:2% %{F#FF9535}п„Ӯ %{F-}%upspeed:2%"
speed-unit = b/s
ping-intervel = 1
format-connected = <label-connected>
;format-connected-prefix = "у°“…  "
format-connected-prefix-font = 1
format-connected-padding = 1
format-disconnected = <label-disconnected>
format-disconnected-prefix = "у°ҲӮ "
format-disconnected-prefix-font = 2
format-disconnected-padding = 1


[module/date]
type = internal/date
interval = 1

# Ajustamos la fecha
date = %I:%M %p
date-alt = "%{F#FF9535}%Y-%m-%d %I:%M:%S %p%{F-}"

# %{A3:comando:} lanza el script con CLIC DERECHO
# %{A1:comando:} lanza el script con CLIC IZQUIERDO
# Usaremos A1 (clic izquierdo) para que sea mГЎs natural
label = %{A1:~/.config/polybar/calendar.sh:}%date%%{A}

label-font = 5
label-foreground = ${colors.aurora-green}

format = <label>
# format-prefix = "уұ‘Ӯ "
# format-prefix-foreground = ${colors.primary}
# format-prefix-font = 2

# Esto asegura que el cursor cambie al pasar sobre el reloj
cursor-click = pointer



[module/battery]
type = internal/battery

; Esto es importante: la mayorГӯa de laptops usan BAT0 o BAT1
; Puedes verificarlo con el comando: ls /sys/class/power_supply/
battery = BAT1
adapter = AC
full-at = 98
low-at = 20


scroll-up = xbacklight -inc 5
scroll-down = xbacklight -dec 5

; Formatos de visualizaciГіn
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
format-low = <animation-low> <label-low>

label-charging = %{A1:~/.config/polybar/battery.sh:} %percentage%%%{A}
label-discharging = %{A1:~/.config/polybar/battery.sh:} %percentage%%%{A}
label-full = %{A1:~/.config/polybar/battery.sh:} %percentage%%%{A}
label-low = %{A1:~/.config/polybar/battery.sh:} %percentage%%%{A}


; Iconos (Rampas) - Usando tus fuentes Nerd Font
ramp-capacity-0 = пү„
ramp-capacity-1 = пүғ
ramp-capacity-2 = пүӮ
ramp-capacity-3 = пүҒ
ramp-capacity-4 = пүҖ
ramp-capacity-foreground = ${colors.primary}

animation-charging-0 = пү„
animation-charging-1 = пүғ
animation-charging-2 = пүӮ
animation-charging-3 = пүҒ
animation-charging-4 = пүҖ
animation-charging-framerate = 750
animation-charging-foreground = ${colors.aurora-green}

animation-low-0 = пү„ 
animation-low-1 = " "
animation-low-framerate = 500
animation-low-foreground = ${colors.alert}

[settings]
screenchange-reload = true
pseudo-transparency = true


[module/cpu-temp]
type = internal/temperature
interval = 1
hwmon-path = ${env:HWMON_CPU:}
warn-temperature = 75
units = true

format = <ramp> <label>
format-warn = <ramp> <label-warn>
label = %temperature-c%
label-foreground = ${colors.aurora-green}

# DEBEN llamarse ramp-0, ramp-1, etc.
ramp-0 = "пӢӢ "
ramp-1 = "пӢҠ "
ramp-2 = "пӢү "
ramp-3 = "пӢҮ "
#ramp-font = 2

[module/gpu-temp]
type = internal/temperature
interval = 1
hwmon-path = ${env:HWMON_GPU:}
warn-temperature = 80
units = true

format = <ramp> <label>
format-warn = <ramp> <label-warn>
label = %temperature-c%
label-foreground = ${colors.aurora-blue}

ramp-0 = "пӢӢ GPU:"
ramp-1 = "пӢҠ GPU:"
ramp-2 = "пӢү GPU:"
ramp-3 = "пӢҮ GPU:"
#ramp-font = 2


[module/mymenu]
type = custom/text
format = <label>
format-padding = 2
label = "%{F#1A1B26}пҢҺ %{F-}" 
click-left = /home/$USER/.config/polybar/rofi.sh
format-background = ${colors.aurora-blue}
format-font = 3

[module/sessionLogout]
type = custom/text
format = <label>
format-padding = 2
label = "%{F#1A1B26}пҖ‘%{F-}"
click-left = /home/$USER/.config/polybar/logout.sh
format-background = ${colors.aurora-blue}
format-font = 4

[module/pacupdate]
type = custom/script
exec = /home/$USER/.config/polybar/mintupdates.sh
interval = 1000
label = %output%
format-font = 2
click-left = notify-send "Updates:" "$(mintupdate-cli list)"

[module/magic-click]
type = custom/text
format = <label>
label = "оҜҸ "
; "click-(left|middle|right)" will be executed using "/bin/sh -c $COMMAND"
click-left = notify-send "Kernel: $(uname -r)"
click-middle = notify-send "Uptime: " "$(uptime -p)"
click-right = kitty -d /home/$USER


[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
index-sort = true
#enable-click = false
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true
